<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون</title>
    <style>
        :root { --primary-green: #1b4d3e; --light-green: #e8f5e9; }
        body { font-family: sans-serif; background-color: var(--light-green); margin: 0; padding-bottom: 80px; }
        .container { padding: 15px; }
        .app-page { display: none; }
        .app-page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ccc; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--primary-green); display: flex; justify-content: space-around; padding: 10px 0; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quranPage" class="app-page active">
            <h3>القرآن الكريم</h3>
            <div id="quranList" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                </div>
            <audio id="mainAudio" controls style="width:100%; margin-top:20px;"></audio>
        </div>

        <div id="radioPage" class="app-page">
            <h3>إذاعة القرآن ومواقيت الصلاة</h3>
            <audio controls style="width:100%"><source src="https://radio.quran.com.sa/makkah" type="audio/mpeg"></audio>
            <iframe src="https://www.aladhan.com/prayer-times-widget.php?city=Riyadh&country=SA&timeformat=12" style="width:100%; height:400px; border:none; margin-top:20px;"></iframe>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="switchPage('quran')">📖 القرآن</div>
        <div onclick="switchPage('radio')">📻 الراديو والمواقيت</div>
    </nav>

    <script>
        // تصحيح أزرار القرآن (تشغيل مباشر)
        const quranList = document.getElementById('quranList');
        for(let i=1; i<=10; i++) {
            let btn = document.createElement('button');
            btn.innerText = "الحزب " + i;
            btn.onclick = () => {
                let audio = document.getElementById('mainAudio');
                audio.src = "https://server8.mp3quran.net/afs/" + i.toString().padStart(3, '0') + ".mp3";
                audio.play();
            };
            quranList.appendChild(btn);
        }

        function switchPage(p) {
            document.querySelectorAll('.app-page').forEach(x => x.classList.remove('active'));
            document.getElementById(p + 'Page').classList.add('active');
        }
    </script>
</body>
</html>
