<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الألعاب المصغرة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #161625;
            padding: 15px;
            border-radius: 15px;
        }
        h1 { color: #e94560; font-size: 1.5rem; margin: 5px; }
        .stats {
            font-size: 1.1rem;
            margin: 10px 0;
            background: #0f3460;
            padding: 8px;
            border-radius: 8px;
        }
        .menu-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        /* تصميم منطقة لعبة سابوي */
        #game-area {
            display: none; /* مخفية في البداية */
            position: relative;
            width: 300px;
            height: 400px;
            background: #222;
            margin: 10px auto;
            border: 4px solid #e94560;
            overflow: hidden;
            border-radius: 10px;
        }
        /* اللاعب (المربع الأزرق) */
        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #3498db;
            bottom: 20px;
            left: 130px; /* المسار الأوسط */
            border-radius: 5px;
            transition: left 0.1s ease;
        }
        /* العقبات (المربع الأحمر) */
        .obstacle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #e74c3c;
            top: -40px;
            border-radius: 5px;
        }
        /* العملات (الدائرة الصفراء) */
        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #f1c40f;
            top: -30px;
            border-radius: 50%;
        }
        .controls {
            margin-top: 10px;
        }
        .control-btn {
            padding: 10px 25px;
            font-size: 1.2rem;
            margin: 5px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 منصة الألعاب 🎮</h1>
    
    <div class="stats">
        🪙 رصيد الفلوس الكلي: <span id="total-coins">0</span>
    </div>

    <!-- القائمة الرئيسية للمنصة -->
    <div id="main-menu">
        <button class="menu-btn" onclick="startSubway()">🏃‍♂️ العب لعبة الركض (Subway)</button>
        <p style="color: #888;">اضغط الزر لبدء اللعبة داخل المنصة فوراً!</p>
    </div>

    <!-- منطقة اللعبة الحية -->
    <div id="game-area">
        <div id="player"></div>
    </div>

    <!-- أزرار التحكم للجوال -->
    <div id="game-controls" style="display:none;" class="controls">
        <button class="control-btn" onclick="movePlayer('left')">⬅️ يسار</button>
        <button class="control-btn" onclick="movePlayer('right')">يمين ➡️</button>
        <br>
        <button class="menu-btn" style="background:#555;" onclick="backToMenu()">خروج للمنصة</button>
    </div>
</div>

<script>
    // الحفظ التلقائي في المنصة
    let totalCoins = parseInt(localStorage.getItem("platformCoins")) || 0;
    document.getElementById("total-coins").innerText = totalCoins;

    // متغيرات اللعبة
    let gameInterval;
    let spawnInterval;
    let gameActive = false;
    let playerLane = 1; // 0=يسار, 1=وسط, 2=يمين
    const lanes = [45, 130, 215]; // إحداثيات المسارات بـ البكسل
    let gameArea = document.getElementById("game-area");
    let player = document.getElementById("player");

    function startSubway() {
        document.getElementById("main-menu").style.display = "none";
        gameArea.style.display = "block";
        document.getElementById("game-controls").style.display = "block";
        
        gameActive = true;
        playerLane = 1;
        player.style.left = lanes[playerLane] + "px";

        // تشغيل حلقة اللعبة (تحديث الحركة)
        gameInterval = setInterval(updateGame, 20);
        // توليد عقبات وعملات كل ثانية ونصف
        spawnInterval = setInterval(spawnItem, 1500);
    }

    function movePlayer(direction) {
        if (!gameActive) return;
        if (direction === 'left' && playerLane > 0) {
            playerLane--;
        } else if (direction === 'right' && playerLane < 2) {
            playerLane++;
        }
        player.style.left = lanes[playerLane] + "px";
    }

    // التحكم عن طريق أسهم الكيبورد للكمبيوتر
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a') movePlayer('left');
        if (e.key === 'ArrowRight' || e.key === 'd') movePlayer('right');
    });

    function spawnItem() {
        if (!gameActive) return;
        let randomLane = Math.floor(Math.random() * 3);
        let isCoin = Math.random() > 0.5; // 50% تطلع عملة أو عقبة

        let item = document.createElement("div");
        item.classList.add(isCoin ? "coin" : "obstacle");
        item.style.left = lanes[randomLane] + 5 + "px"; // موازنة السقوط في المسار
        item.style.top = "-40px";
        gameArea.appendChild(item);
    }

    function updateGame() {
        let items = gameArea.querySelectorAll(".coin, .obstacle");
        
        items.forEach(item => {
            let top = parseInt(item.style.top);
            top += 5; // سرعة النزول
            item.style.top = top + "px";

            // فحص التصادم مع اللاعب
            let itemLeft = parseInt(item.style.left);
            let playerLeft = parseInt(player.style.left);

            if (top > 340 && top < 380 && Math.abs(itemLeft - playerLeft) < 20) {
                if (item.classList.contains("coin")) {
                    // إذا جمع عملة
                    totalCoins += 1;
                    localStorage.setItem("platformCoins", totalCoins);
                    document.getElementById("total-coins").innerText = totalCoins;
                    item.remove();
                } else {
                    // إذا صدم عقبة (خسر)
                    alert("للطف! صدمت القطار 💥 ونقاطك انحفظت بالمنصة!");
                    backToMenu();
                }
            }

            // حذف العناصر اللي تطلع خارج الشاشة
            if (top > 400) {
                item.remove();
            }
        });
    }

    function backToMenu() {
        gameActive = false;
        clearInterval(gameInterval);
        clearInterval(spawnInterval);
        
        // تنظيف الشاشة من العقبات المتبقية
        let items = gameArea.querySelectorAll(".coin, .obstacle");
        items.forEach(item => item.remove());

        // العودة للمنصة
        gameArea.style.display = "none";
        document.getElementById("game-controls").style.display = "none";
        document.getElementById("main-menu").style.display = "block";
    }
</script>

</body>
</html>
