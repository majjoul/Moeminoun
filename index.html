<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون المتكامل</title>
    <style>
        body { font-family: sans-serif; background: #e0e5e2; text-align: center; padding: 10px; }
        .card { background: #fff; padding: 15px; margin: 10px 0; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #2d5a45; color: white; border: none; padding: 12px; border-radius: 8px; margin: 5px; cursor: pointer; }
        #compass { width: 100px; height: 100px; border: 5px solid #2d5a45; border-radius: 50%; margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: transform 0.3s; }
    </style>
</head>
<body>

    <h1>مؤمنون</h1>

    <!-- 1. عداد التسبيح -->
    <div class="card">
        <h3>التسبيح</h3>
        <h2 id="counter">0</h2>
        <button onclick="increment()">سبّح</button>
        <button onclick="reset()">تصفير</button>
    </div>

    <!-- 2. إذاعة مكة المكرمة -->
    <div class="card">
        <h3>إذاعة مكة المكرمة</h3>
        <audio controls style="width: 100%;">
            <source src="https://radio.quran.com.sa/makkah" type="audio/mpeg">
        </audio>
    </div>

    <!-- 3. الأذكار -->
    <div class="card">
        <h3>الأذكار</h3>
        <p id="dhikr" style="font-size: 18px;">سبحان الله وبحمده</p>
        <button onclick="changeDhikr()">تغيير الذكر</button>
    </div>

    <!-- 4. القبلة -->
    <div class="card">
        <h3>اتجاه القبلة</h3>
        <div id="compass">⬆</div>
        <p>قم بتدوير الهاتف</p>
    </div>

    <script>
        // التسبيح
        let count = 0;
        function increment() { count++; document.getElementById("counter").innerText = count; }
        function reset() { count = 0; document.getElementById("counter").innerText = count; }

        // الأذكار
        const dhikrs = ["سبحان الله وبحمده", "استغفر الله العظيم", "لا إله إلا الله", "اللهم صل على محمد", "لاحول ولا قوة إلا بالله"];
        function changeDhikr() {
            document.getElementById("dhikr").innerText = dhikrs[Math.floor(Math.random() * dhikrs.length)];
        }

        // القبلة
        window.addEventListener("deviceorientation", (event) => {
            const compass = event.webkitCompassHeading || event.alpha;
            document.getElementById("compass").style.transform = `rotate(${-compass}deg)`;
        });
    </script>
</body>
</html>
