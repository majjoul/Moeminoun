<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون</title>
    <style>
        body { font-family: sans-serif; background: #e8f5e9; margin: 0; padding-bottom: 70px; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #1b4d3e; color: white; border: none; padding: 10px; border-radius: 8px; margin: 5px; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #1b4d3e; display: flex; justify-content: space-around; padding: 10px 0; color: white; }
        .nav div { cursor: pointer; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

    <!-- القرآن -->
    <div id="quran" class="page active">
        <h3>القرآن الكريم</h3>
        <div class="card">
            <button onclick="playAudio('https://server8.mp3quran.net/afs/001.mp3')">سورة الفاتحة</button>
            <button onclick="playAudio('https://server8.mp3quran.net/afs/002.mp3')">سورة البقرة</button>
        </div>
        <audio id="audioPlayer" controls style="width:100%"></audio>
    </div>

    <!-- الراديو -->
    <div id="radio" class="page">
        <h3>إذاعة القرآن الكريم</h3>
        <div class="card">
            <audio controls style="width:100%">
                <source src="https://radio.quran.com.sa/makkah" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <!-- الأذكار -->
    <div id="azkar" class="page">
        <h3>الأذكار</h3>
        <div class="card">
            <p id="dhikrText">سبحان الله وبحمده</p>
            <button onclick="changeDhikr()">ذكر آخر</button>
        </div>
    </div>

    <!-- التسبيح -->
    <div id="tasbeeh" class="page">
        <h3>التسبيح</h3>
        <div class="card">
            <h1 id="count">0</h1>
            <button onclick="count++ ; document.getElementById('count').innerText = count">سبّح</button>
            <button onclick="count=0 ; document.getElementById('count').innerText = count">تصفير</button>
        </div>
    </div>

    <div class="nav">
        <div onclick="show('quran')">📖<br>القرآن</div>
        <div onclick="show('radio')">📻<br>الراديو</div>
        <div onclick="show('azkar')">📿<br>الأذكار</div>
        <div onclick="show('tasbeeh')">📿<br>السبحة</div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function playAudio(url) {
            let p = document.getElementById('audioPlayer');
            p.src = url;
            p.play();
        }
        let count = 0;
        function changeDhikr() {
            let list = ["سبحان الله", "الحمد لله", "الله أكبر"];
            document.getElementById('dhikrText').innerText = list[Math.floor(Math.random()*list.length)];
        }
    </script>
</body>
</html>
