<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون</title>
    <style>
        :root { --primary-green: #1b4d3e; --light-green: #e8f5e9; --accent-gold: #d4af37; }
        body { font-family: sans-serif; background-color: var(--light-green); margin: 0; padding: 0; }
        .app-page { display: none; }
        .app-page.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background-color: var(--primary-green); display: flex; justify-content: space-around; padding: 10px 0; color: white; z-index: 1000; }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; }
        .nav-item.active { font-weight: bold; color: var(--bright-gold); }
        .quran-view { display: none; padding: 20px; background: white; }
        .hzb-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 20px; }
        .hzb-card { background: white; padding: 15px; border: 1px solid var(--primary-green); text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="quranPage" class="app-page active">
    <div id="mainListView">
        <div class="hzb-grid" id="hzbGrid"></div>
    </div>
    <div id="quranReaderView" class="quran-view">
        <button onclick="closeHusb()">العودة</button>
        <h2 id="currentHusbTitle"></h2>
        <button onclick="showQR()">مشاركة الحزب عبر QR 📱</button>
        <div id="qrModal" style="display:none;"><div id="qrcode"></div><button onclick="document.getElementById('qrModal').style.display='none'">إغلاق</button></div>
        <audio id="audioPlayer" controls></audio>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('quran', this)">📖 القرآن</div>
    <div class="nav-item" onclick="switchPage('azkar', this)">🌙 الأذكار</div>
    <div class="nav-item" onclick="switchPage('tasbeeh', this)">📿 السبحة</div>
    <div class="nav-item" onclick="switchPage('prayer', this)">🕋 المواقيت</div>
    <div class="nav-item" onclick="switchPage('radio', this)">📻 الإذاعة</div>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    let currentHusbNumber = 1;

    function switchPage(page, el) {
        document.querySelectorAll('.app-page').forEach(p => p.style.display = 'none');
        document.getElementById(page + 'Page')?.style.display = 'block';
        if(page === 'quran') document.getElementById('quranPage').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function openHusb(n) {
        currentHusbNumber = n;
        document.getElementById('mainListView').style.display = 'none';
        document.getElementById('quranReaderView').style.display = 'block';
        document.getElementById('currentHusbTitle').innerText = "الحزب " + n;
        // إصلاح الصوت: الربط المباشر بملف mp3
        document.getElementById('audioPlayer').src = "https://server12.mp3quran.net/maher/" + n.toString().padStart(3, '0') + ".mp3";
    }

    function closeHusb() {
        document.getElementById('quranReaderView').style.display = 'none';
        document.getElementById('mainListView').style.display = 'block';
        document.getElementById('audioPlayer').pause();
    }

    function showQR() {
        document.getElementById('qrModal').style.display = 'block';
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), window.location.href + "?hzb=" + currentHusbNumber);
    }

    const grid = document.getElementById('hzbGrid');
    for (let i = 1; i <= 60; i++) {
        const div = document.createElement('div'); div.className = 'hzb-card';
        div.innerText = "الحزب " + i; div.onclick = () => openHusb(i);
        grid.appendChild(div);
    }
</script>
</body>
</html>
