<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مؤمنون</title>
    <style>
        body { font-family: sans-serif; background: #e8f5e9; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        button { padding: 15px; background: #1b4d3e; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>تطبيق مؤمنون</h1>
    <audio id="player" controls style="width:100%"></audio>
    <div class="grid" id="container"></div>

    <script>
        const container = document.getElementById('container');
        const player = document.getElementById('player');
        
        for(let i=1; i<=60; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.onclick = () => {
                player.src = "https://server8.mp3quran.net/lhdan/" + i.toString().padStart(3, '0') + ".mp3";
                player.play();
            };
            container.appendChild(btn);
        }
    </script>
</body>
</html>
