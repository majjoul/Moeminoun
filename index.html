<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        :root { --primary-green: #1b4d3e; --light-green: #e8f5e9; --accent-gold: #d4af37; }
        body { font-family: sans-serif; background-color: var(--light-green); margin: 0; padding: 0; }
        header { background-color: var(--primary-green); color: white; text-align: center; padding: 15px 0; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; margin-bottom: 70px; }
        .app-page { display: none; }
        .app-page.active { display: block; }
        .title-section { text-align: center; margin-bottom: 20px; color: var(--primary-green); font-weight: bold; }
        .hzb-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .hzb-card { background: white; border: 2px solid var(--primary-green); padding: 10px; text-align: center; border-radius: 8px; color: var(--primary-green); cursor: pointer; }
        .quran-view { display: none; background: #fdfbf7; padding: 15px; border-radius: 8px; }
        .back-btn { background: var(--primary-green); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; }
        .azkar-list { display: none; }
        .azkar-list.active { display: block; }
        .azkar-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; text-align: center; }
        .counter-btn { background: var(--primary-green); color: white; border: none; padding: 8px 20px; border-radius: 20px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--primary-green); display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #a3c2b8; cursor: pointer; text-align: center; font-size: 14px; }
        .nav-item.active { color: white; font-weight: bold; }
        .radio-card { background: white; padding: 20px; text-align: center; border-radius: 8px; }
    </style>
</head>
<body>

    <header><h1>مؤمنون</h1></header>

    <div class="container">
        <div id="quranPage" class="app-page active">
            <div id="mainListView">
                <div class="title-section">القرآن الكريم</div>
                <div class="hzb-grid" id="hzbGrid"></div>
            </div>
            <div id="quranReaderView" class="quran-view">
                <button class="back-btn" onclick="closeHusb()">← العودة</button>
                <div id="quranTextContent" style="margin-top:15px; line-height:1.8;"></div>
            </div>
        </div>

        <div id="azkarPage" class="app-page">
            <div class="title-section">الأذكار</div>
            <div id="tab-sabah" class="azkar-list active">
                <div class="azkar-card">
                    <div>"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ"</div>
                    <button class="counter-btn" onclick="countUp(this)">التكرار: <span class="count">3</span></button>
                </div>
            </div>
        </div>

        <div id="tasbeehPage" class="app-page">
            <div class="title-section">السبحة</div>
            <div style="text-align:center;">
                <div id="tasbeehCount" style="font-size:50px;">0</div>
                <button onclick="document.getElementById('tasbeehCount').innerText++" style="padding:20px; border-radius:50%; border:none; background:var(--primary-green); color:white;">اضغط</button>
            </div>
        </div>

        <div id="radioPage" class="app-page">
            <div class="title-section">الإذاعة</div>
            <div class="radio-card">
                <audio id="liveRadioPlayer" src="https://stream.radiojar.com/8s9u5t6w7uzzv" controls></audio>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('quranPage', this)">📖 القرآن</div>
        <div class="nav-item" onclick="switchPage('azkarPage', this)">🌙 الأذكار</div>
        <div class="nav-item" onclick="switchPage('tasbeehPage', this)">📿 السبحة</div>
        <div class="nav-item" onclick="switchPage('radioPage', this)">📻 الإذاعة</div>
    </nav>

    <script>
        function switchPage(id, btn) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
        
        const grid = document.getElementById('hzbGrid');
        for (let i = 1; i <= 60; i++) {
            const card = document.createElement('div'); card.className = 'hzb-card'; card.innerText = i;
            card.onclick = () => { document.getElementById('mainListView').style.display='none'; document.getElementById('quranReaderView').style.display='block'; };
            grid.appendChild(card);
        }
        function closeHusb() { document.getElementById('mainListView').style.display='block'; document.getElementById('quranReaderView').style.display='none'; }
        function countUp(btn) { let c = btn.querySelector('.count'); if(c.innerText>0) c.innerText--; }
    </script>
</body>
</html>
