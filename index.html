<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --primary-green: #1b4d3e;
            --light-green: #e8f5e9;
            --accent-gold: #d4af37;
            --bright-gold: #ffd700;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light-green); margin: 0; padding: 0; color: #333; -webkit-tap-highlight-color: transparent; }
        
        header { background-color: var(--primary-green); color: white; text-align: center; padding: 15px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 24px; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; margin-bottom: 90px; }
        .app-page { display: none; }
        .app-page.active { display: block; }
        .title-section { text-align: center; margin-bottom: 20px; color: var(--primary-green); font-weight: bold; font-size: 20px; }

        /* القرآن */
        .hzb-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .hzb-card { background-color: white; border: 2px solid var(--primary-green); border-radius: 12px; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; color: var(--primary-green); cursor: pointer; }
        .quran-view { display: none; background-color: #fdfbf7; border-radius: 12px; padding: 20px; border: 1px solid #e0dcd3; }
        .audio-section { background-color: #f0f7f4; border: 1px solid #c8e6c9; border-radius: 8px; padding: 12px; margin-bottom: 20px; text-align: center; }
        .sheikh-select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--primary-green); color: var(--primary-green); font-size: 16px; }
        audio { width: 100%; margin-top: 5px; }
        .quran-text { font-size: 22px; line-height: 1.8; text-align: justify; }
        .back-btn { background-color: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; margin-bottom: 15px; cursor: pointer; }

        /* الأذكار */
        .azkar-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { background-color: white; border: 1px solid var(--primary-green); color: var(--primary-green); padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background-color: var(--primary-green); color: white; }
        .azkar-list { display: none; }
        .azkar-list.active { display: block; }
        .azkar-card { background-color: white; border: 1px solid #c8e6c9; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .counter-btn { background-color: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }

        /* السبحة */
        .tasbeeh-circle { width: 200px; height: 200px; background-color: white; border: 10px solid var(--primary-green); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto; }
        .tasbeeh-number { font-size: 40px; font-weight: bold; color: var(--primary-green); }

        /* مواقيت الصلاة والقبلة */
        .prayer-card { background-color: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .time-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .compass { width: 150px; height: 150px; border: 5px solid var(--primary-green); border-radius: 50%; margin: 20px auto; position: relative; }
        .compass-pointer { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 60px solid #d32f2f; position: absolute; top: 15px; left: 65px; }

        /* التنقل */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background-color: var(--primary-green); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { color: #a3c2b8; text-align: center; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: white; font-weight: bold; }
    </style>
</head>
<body>

    <header><h1>مؤمنون</h1></header>

    <div class="container">
        <div id="quranPage" class="app-page active">
            <div id="mainListView">
                <div class="title-section">القرآن الكريم</div>
                <div class="hzb-grid" id="hzbGrid"></div>
            </div>
            <div id="quranReaderView" class="quran-view">
                <button class="back-btn" onclick="closeHusb()">← العودة</button>
                <div class="audio-section">
                    <select id="sheikhSelect" class="sheikh-select" onchange="changeReciter()">
                        <option value="lhdan">محمد اللحيدان</option>
                        <option value="dosari">ياسر الدوسري</option>
                    </select>
                    <audio id="audioPlayer" controls></audio>
                </div>
                <div class="quran-text" id="quranTextContent"></div>
            </div>
        </div>

        <div id="azkarPage" class="app-page">
            <div class="title-section">حصن المسلم</div>
            <div class="azkar-tabs">
                <button class="tab-btn active" onclick="switchAzkarTab('sabah', this)">الصباح</button>
                <button class="tab-btn" onclick="switchAzkarTab('masaa', this)">المساء</button>
            </div>
            <div id="tab-sabah" class="azkar-list active">
                <div class="azkar-card">"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ"<br><button class="counter-btn" onclick="countUp(this)">تكرار: <span class="count">1</span></button></div>
            </div>
        </div>

        <div id="tasbeehPage" class="app-page">
            <div class="title-section">السبحة</div>
            <div class="tasbeeh-circle" onclick="incrementTasbeeh()"><span class="tasbeeh-number" id="tasbeehCount">0</span></div>
        </div>

        <div id="prayerPage" class="app-page">
            <div class="title-section">مواقيت الصلاة</div>
            <div class="prayer-card">
                <div class="time-row"><span>الفجر</span><span>04:30 ص</span></div>
                <div class="time-row"><span>الظهر</span><span>12:30 م</span></div>
            </div>
            <div class="compass" id="compassDisk"><div class="compass-pointer"></div></div>
        </div>

        <div id="radioPage" class="app-page">
            <div class="title-section">إذاعة القرآن الكريم</div>
            <button class="back-btn" onclick="toggleRadio()">تشغيل/إيقاف</button>
            <audio id="liveRadioPlayer" src="https://stream.radiojar.com/8s9u5t6w7uzzv"></audio>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('quran')">📖<br>القرآن</div>
        <div class="nav-item" onclick="switchPage('azkar')">🌙<br>الأذكار</div>
        <div class="nav-item" onclick="switchPage('tasbeeh')">📿<br>السبحة</div>
        <div class="nav-item" onclick="switchPage('prayer')">🕋<br>المواقيت</div>
        <div class="nav-item" onclick="switchPage('radio')">📻<br>الإذاعة</div>
    </nav>

    <script>
        function switchPage(p) {
            document.querySelectorAll('.app-page').forEach(e => e.classList.remove('active'));
            document.getElementById(p + 'Page').classList.add('active');
        }
        function switchAzkarTab(t, b) {
            document.querySelectorAll('.azkar-list').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            b.classList.add('active');
        }
        function incrementTasbeeh() { let c = document.getElementById('tasbeehCount'); c.innerText = parseInt(c.innerText) + 1; }
        function countUp(btn) { let s = btn.querySelector('.count'); s.innerText = parseInt(s.innerText) - 1; }
        function toggleRadio() { let a = document.getElementById('liveRadioPlayer'); a.paused ? a.play() : a.pause(); }
        
        // بناء أحزاب القرآن
        const grid = document.getElementById('hzbGrid');
        for(let i=1; i<=60; i++) {
            let card = document.createElement('div'); card.className = 'hzb-card'; card.innerText = 'الحزب ' + i;
            card.onclick = () => alert('فتح الحزب ' + i); grid.appendChild(card);
        }
    </script>
</body>
</html>
