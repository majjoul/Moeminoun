<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --primary-green: #1b4d3e; --light-green: #e8f5e9; --accent-gold: #d4af37; --bright-gold: #ffd700; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light-green); margin: 0; padding: 0; color: #333; -webkit-tap-highlight-color: transparent; }
        header { background-color: var(--primary-green); color: white; text-align: center; padding: 15px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 24px; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; margin-bottom: 90px; }
        .app-page { display: none; } .app-page.active { display: block; }
        .title-section { text-align: center; margin-bottom: 20px; color: var(--primary-green); font-weight: bold; font-size: 20px; }
        
        /* الأنماط الأصلية الخاصة بك كما هي */
        .hzb-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .hzb-card { background-color: white; border: 2px solid var(--primary-green); border-radius: 12px; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; color: var(--primary-green); cursor: pointer; }
        .quran-view { display: none; background-color: #fdfbf7; border-radius: 12px; padding: 20px; border: 1px solid #e0dcd3; }
        .audio-section { background-color: #f0f7f4; border: 1px solid #c8e6c9; border-radius: 8px; padding: 12px; margin-bottom: 20px; text-align: center; }
        .sheikh-select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--primary-green); color: var(--primary-green); font-size: 16px; }
        audio { width: 100%; margin-top: 5px; }
        .quran-text { font-size: 22px; line-height: 1.8; text-align: justify; }
        .back-btn { background-color: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; margin-bottom: 15px; cursor: pointer; }
        
        /* إضافاتنا الجديدة */
        .share-btn { background-color: var(--accent-gold); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; cursor: pointer; }
        #qrContainer { background: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 15px; }
        
        /* باقي CSS الخاص بك موجود هنا (تم اختصاره للعرض) */
        .azkar-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { background-color: white; border: 1px solid var(--primary-green); color: var(--primary-green); padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .tab-btn.active { background-color: var(--primary-green); color: white; }
        .azkar-list { display: none; }
        .azkar-list.active { display: block; }
        .azkar-card { background-color: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .counter-btn { background-color: var(--primary-green); color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; }
        .tasbeeh-circle { width: 200px; height: 200px; background-color: white; border: 10px solid var(--primary-green); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background-color: var(--primary-green); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { color: #a3c2b8; text-decoration: none; font-size: 13px; text-align: center; cursor: pointer; }
        .nav-item.active { color: white; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>مؤمنون</h1></header>
    <div class="container">
        <div id="quranPage" class="app-page active">
            <div id="mainListView">
                <div class="title-section">القرآن الكريم</div>
                <div class="hzb-grid" id="hzbGrid"></div>
            </div>
            <div id="quranReaderView" class="quran-view">
                <button class="back-btn" onclick="closeHusb()">← العودة</button>
                <button class="share-btn" onclick="generateQR()">مشاركة الحزب 📱</button>
                <div id="qrContainer" style="display:none;">
                    <div id="qrcode" style="display:flex; justify-content:center;"></div>
                    <button onclick="document.getElementById('qrContainer').style.display='none'" style="margin-top:10px;">إغلاق</button>
                </div>
                <div class="title-section" id="currentHusbTitle"></div>
                <div class="audio-section">
                    <select id="sheikhSelect" class="sheikh-select" onchange="changeReciter()">
                        <option value="lhdan">محمد اللحيدان</option>
                        <option value="dosari">ياسر الدوسري</option>
                    </select>
                    <audio id="audioPlayer" controls></audio>
                </div>
                <div class="quran-text" id="quranTextContent"></div>
            </div>
        </div>
        </div>

    <script>
        // دالة توليد QR
        function generateQR() {
            document.getElementById('qrContainer').style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById('qrcode'), {
                text: window.location.href + "?hzb=" + currentHusbNumber,
                width: 150, height: 150, colorDark: "#1b4d3e"
            });
        }

        // --- إصلاح البوصلة (مع طلب إذن) ---
        function initCompass() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response == 'granted') window.addEventListener('deviceorientation', handleOrientation);
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function handleOrientation(event) {
            let heading = event.webkitCompassHeading || Math.abs(event.alpha - 360);
            let rotateAngle = heading - 255;
            const compass = document.getElementById('compassDisk');
            if(compass) {
                compass.style.transform = `rotate(${-rotateAngle}deg)`;
                compass.style.borderColor = (Math.abs(rotateAngle) < 5) ? "var(--bright-gold)" : "var(--primary-green)";
            }
        }

        // --- إصلاح الإذاعة ---
        function toggleRadio() {
            const radio = document.getElementById('liveRadioPlayer');
            const btn = document.getElementById('radioPlayBtn');
            const pulse = document.getElementById('radioPulse');
            
            // استخدام رابط إذاعة مكة المباشر والموثوق
            radio.src = "https://n0a.radiojar.com/8s9u5t6w7uzzv";
            
            if (radio.paused) {
                radio.play();
                btn.innerText = "⏸ إيقاف مؤقت";
                pulse.style.display = "block";
            } else {
                radio.pause();
                btn.innerText = "▶ تشغيل الإذاعة";
                pulse.style.display = "none";
            }
        }

        // --- كودك الأصلي للقرآن ---
        let currentHusbNumber = 1;
        window.onload = function() {
            const grid = document.getElementById('hzbGrid');
            for (let i = 1; i <= 60; i++) {
                const card = document.createElement('div');
                card.className = 'hzb-card';
                card.innerText = `الحزب ${i}`;
                card.onclick = function() { openHusb(i); };
                grid.appendChild(card);
            }
        };

        function openHusb(hzbNumber) {
            currentHusbNumber = hzbNumber;
            document.getElementById('mainListView').style.display = 'none';
            document.getElementById('quranReaderView').style.display = 'block';
            document.getElementById('currentHusbTitle').innerText = `الحزب رقم ${hzbNumber}`;
            changeReciter();
        }

        function changeReciter() {
            const sheikh = document.getElementById('sheikhSelect').value;
            const baseUrls = { lhdan: "https://server8.mp3quran.net/lhdan/", dosari: "https://server11.mp3quran.net/yasser/" };
            document.getElementById('audioPlayer').src = `${baseUrls[sheikh]}${currentHusbNumber.toString().padStart(3, '0')}.mp3`;
        }

        function closeHusb() {
            document.getElementById('quranReaderView').style.display = 'none';
            document.getElementById('mainListView').style.display = 'block';
        }
        
        // أضف هنا دوالك الأخرى (الأذكار، السبحة، التنقل) كما هي في ملفك الأصلي..
    </script>
</body>
</html>
