<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e8f5e9; margin: 0; padding-bottom: 70px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { background: #1b4d3e; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #1b4d3e; display: flex; justify-content: space-around; padding: 10px 0; color: white; font-size: 12px; }
        .nav div { cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div id="quran" class="page active">
        <h3>القرآن الكريم</h3>
        <div class="grid" id="hzbGrid"></div>
        <audio id="audioPlayer" controls style="width:100%; margin-top:15px;"></audio>
    </div>

    <div id="radio" class="page">
        <h3>إذاعة مكة والمواقيت</h3>
        <div class="card">
            <audio controls style="width:100%"><source src="https://radio.quran.com.sa/makkah" type="audio/mpeg"></audio>
        </div>
        <div class="card">
            <iframe src="https://www.aladhan.com/prayer-times-widget.php?city=Riyadh&country=SA" style="width:100%; height:300px; border:none;"></iframe>
        </div>
    </div>

    <div id="azkar" class="page">
        <h3>الأذكار</h3>
        <div class="card" id="dhikrBox">سبحان الله وبحمده<br><br><button onclick="nextDhikr()">التالي</button></div>
    </div>

    <div id="tasbeeh" class="page">
        <h3>التسبيح</h3>
        <div class="card">
            <h1 id="count">0</h1>
            <button onclick="count++ ; document.getElementById('count').innerText = count">سبّح</button>
            <button onclick="count=0 ; document.getElementById('count').innerText = count">تصفير</button>
        </div>
    </div>

    <div class="nav">
        <div onclick="show('quran')">📖<br>القرآن</div>
        <div onclick="show('radio')">📻<br>الراديو</div>
        <div onclick="show('azkar')">📿<br>الأذكار</div>
        <div onclick="show('tasbeeh')">📿<br>التسبيح</div>
    </div>

    <script>
        // إنشاء 60 حزباً
        const grid = document.getElementById('hzbGrid');
        for(let i=1; i<=60; i++) {
            let btn = document.createElement('button');
            btn.innerText = "حزب " + i;
            btn.onclick = () => { 
                let p = document.getElementById('audioPlayer');
                p.src = "https://server8.mp3quran.net/afs/" + i.toString().padStart(3, '0') + ".mp3";
                p.play();
            };
            grid.appendChild(btn);
        }

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function nextDhikr() {
            let z = ["سبحان الله وبحمده", "استغفر الله العظيم", "لا إله إلا الله", "الله أكبر", "اللهم صل على محمد"];
            document.getElementById('dhikrBox').innerHTML = z[Math.floor(Math.random()*z.length)] + "<br><br><button onclick='nextDhikr()'>التالي</button>";
        }

        let count = 0;
    </script>
</body>
</html>
