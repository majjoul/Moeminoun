<div id="azkarPage" class="app-page">
    <div class="title-section">حصن المسلم</div>
    <div class="azkar-tabs" id="azkarTabs">
        </div>
    <div id="azkarContent"></div>
</div>

<div id="radioPage" class="app-page">
    <div class="title-section">إذاعة القرآن من مكة</div>
    <div class="radio-card">
        <div class="radio-pulse" id="radioPulse"></div>
        <audio id="liveRadioPlayer" src="https://n0a.radiojar.com/8s9u5t6w7uzzv"></audio>
        <button class="back-btn" id="radioPlayBtn" onclick="toggleRadio()">▶ تشغيل الإذاعة</button>
    </div>
</div>

<script>
    // --- بيانات الأذكار ---
    const azkarData = {
        "الصباح": [
            { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ", count: 3 },
            { text: "اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا", count: 1 }
        ],
        "المساء": [
            { text: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ", count: 3 },
            { text: "اللَّهُمَّ بِكَ أَمْسَيْنَا وَبِكَ أَصْبَحْنَا", count: 1 }
        ]
    };

    // توليد الأذكار
    function renderAzkar() {
        const container = document.getElementById('azkarContent');
        const tabs = document.getElementById('azkarTabs');
        
        for (let type in azkarData) {
            // إضافة التبويب
            tabs.innerHTML += `<button class="tab-btn" onclick="showAzkar('${type}')">${type}</button>`;
            
            // إضافة المحتوى
            let html = `<div id="list-${type}" class="azkar-list">`;
            azkarData[type].forEach(z => {
                html += `<div class="azkar-card"><div class="azkar-text">${z.text}</div>
                         <button class="counter-btn" onclick="countUp(this)">التكرار: <span class="count">${z.count}</span></button></div>`;
            });
            container.innerHTML += html + `</div>`;
        }
    }

    // --- تشغيل الإذاعة ---
    function toggleRadio() {
        const radio = document.getElementById('liveRadioPlayer');
        const btn = document.getElementById('radioPlayBtn');
        const pulse = document.getElementById('radioPulse');
        
        if (radio.paused) {
            radio.play();
            btn.innerText = "⏸ إيقاف الإذاعة";
            pulse.style.display = "block";
        } else {
            radio.pause();
            btn.innerText = "▶ تشغيل الإذاعة";
            pulse.style.display = "none";
        }
    }

    window.onload = function() {
        renderAzkar();
        // أي وظائف أخرى عند التحميل
    };
</script>
