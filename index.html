<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --primary-green: #1b4d3e; --light-green: #e8f5e9; --accent-gold: #d4af37; --bright-gold: #ffd700; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--light-green); margin: 0; padding: 0; color: #333; }
        header { background-color: var(--primary-green); color: white; text-align: center; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; margin-bottom: 90px; }
        .app-page { display: none; }
        .app-page.active { display: block; }
        .card { background-color: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .hzb-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .hzb-card { background-color: white; border: 2px solid var(--primary-green); border-radius: 12px; padding: 15px; text-align: center; font-weight: bold; color: var(--primary-green); cursor: pointer; }
        button { background-color: var(--primary-green); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background-color: var(--primary-green); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { color: #a3c2b8; text-align: center; cursor: pointer; font-size: 13px; }
        .nav-item.active { color: white; font-weight: bold; }
    </style>
</head>
<body>

    <header><h1>مؤمنون</h1></header>

    <div class="container">
        <div id="quranPage" class="app-page active">
            <div class="hzb-grid" id="hzbGrid"></div>
            <audio id="audioPlayer" controls style="width:100%; margin-top:20px;"></audio>
        </div>

        <div id="radioPage" class="app-page">
            <div class="card">
                <h3>إذاعة القرآن الكريم</h3>
                <audio id="radioPlayer" controls style="width:100%">
                    <source src="https://radio.quran.com.sa/makkah" type="audio/mpeg">
                </audio>
                <br>
                <button onclick="document.getElementById('radioPlayer').play()">اضغط هنا لتشغيل البث مباشرة</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('quranPage', this)">📖 القرآن</div>
        <div class="nav-item" onclick="switchPage('radioPage', this)">📻 الإذاعة</div>
    </nav>

    <script>
        // تفعيل الأحزاب
        const grid = document.getElementById('hzbGrid');
        const player = document.getElementById('audioPlayer');
        for (let i = 1; i <= 60; i++) {
            const card = document.createElement('div');
            card.className = 'hzb-card'; card.innerText = `حزب ${i}`;
            card.onclick = () => {
                player.src = "https://server8.mp3quran.net/lhdan/" + i.toString().padStart(3, '0') + ".mp3";
                player.play();
            };
            grid.appendChild(card);
        }

        function switchPage(pageId, btn) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
