<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون</title>
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        :root { --primary-green: #1b4d3e; --light-green: #e8f5e9; --accent-gold: #d4af37; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--light-green); margin: 0; padding: 0; color: #333; }
        header { background-color: var(--primary-green); color: white; text-align: center; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; margin-bottom: 80px; }
        .app-page { display: none; }
        .app-page.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background-color: var(--primary-green); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { color: #a3c2b8; text-decoration: none; font-size: 13px; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: white; font-weight: bold; }
        
        /* تنسيق الراديو */
        .radio-card { background: white; border: 2px solid var(--primary-green); border-radius: 12px; padding: 20px; text-align: center; }
        .radio-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--primary-green); margin-bottom: 15px; }
        
        /* باقي التنسيقات (موجودة في كودك الأصلي) */
        .hzb-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .hzb-card { background-color: white; border: 2px solid var(--primary-green); border-radius: 12px; padding: 15px; text-align: center; font-weight: bold; color: var(--primary-green); cursor: pointer; }
        .tasbeeh-circle { width: 200px; height: 200px; border: 10px solid var(--primary-green); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; cursor: pointer; }
    </style>
</head>
<body>

    <header><h1>مؤمنون</h1></header>

    <div class="container">
        <!-- صفحة القرآن -->
        <div id="quranPage" class="app-page active">
            <div id="mainListView">
                <div class="hzb-grid" id="hzbGrid"></div>
            </div>
            <div id="quranReaderView" style="display:none;">
                <button onclick="closeHusb()">العودة</button>
                <div id="quranTextContent"></div>
            </div>
        </div>

        <!-- صفحة الراديو -->
        <div id="radioPage" class="app-page">
            <div class="radio-card">
                <h3>إذاعات القرآن الكريم</h3>
                <select id="radioSelect" class="radio-select" onchange="playRadio()">
                    <option value="https://radio.quran.com.sa/makkah">إذاعة مكة المكرمة</option>
                    <option value="https://stream.radiojar.com/8s5u5tpdtf0vv">إذاعة القرآن الكريم</option>
                </select>
                <audio id="radioPlayer" controls style="width:100%"></audio>
            </div>
        </div>

        <!-- صفحة الأذكار -->
        <div id="azkarPage" class="app-page">
            <div class="azkar-card">
                <button class="counter-btn" onclick="countUp(this)">التكرار: <span class="count">100</span></button>
            </div>
        </div>

        <!-- صفحة السبحة -->
        <div id="tasbeehPage" class="app-page">
            <div class="tasbeeh-circle" onclick="incrementTasbeeh()">
                <span id="tasbeehCount">0</span>
            </div>
            <button onclick="resetTasbeeh()">تصفير</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="btnQuran" onclick="switchPage('quran')">📖<br>القرآن</div>
        <div class="nav-item" id="btnRadio" onclick="switchPage('radio')">📻<br>الراديو</div>
        <div class="nav-item" id="btnAzkar" onclick="switchPage('azkar')">📿<br>الأذكار</div>
        <div class="nav-item" id="btnTasbeeh" onclick="switchPage('tasbeeh')">📿<br>السبحة</div>
    </nav>

    <script>
        // دالة التنقل المصححة
        function switchPage(pageName) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageName + 'Page').classList.add('active');
            document.getElementById('btn' + pageName.charAt(0).toUpperCase() + pageName.slice(1)).classList.add('active');
            
            // إيقاف أي صوت عند الانتقال
            document.getElementById('radioPlayer').pause();
        }

        function playRadio() {
            const player = document.getElementById('radioPlayer');
            player.src = document.getElementById('radioSelect').value;
            player.play();
        }

        // دالة السبحة والأذكار (موجودة في سكربتك الأصلي)
        let count = 0;
        function incrementTasbeeh() { count++; document.getElementById('tasbeehCount').innerText = count; }
        function resetTasbeeh() { count = 0; document.getElementById('tasbeehCount').innerText = count; }
        function countUp(btn) { /* منطق الأذكار */ }
        function closeHusb() { /* منطق القرآن */ }
    </script>
</body>
</html>
