<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مؤمنون الشامل</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 10px; }
        .card { background: white; padding: 15px; margin: 10px auto; border-radius: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 10px; background: #27ae60; color: white; cursor: pointer; }
        #compass-arrow { width: 100px; height: 100px; background: red; margin: auto; transition: transform 0.5s; border-radius: 50%; }
    </style>
</head>
<body>

    <h1>مؤمنون</h1>

    <!-- التسبيح -->
    <div class="card">
        <h3>عداد التسبيح</h3>
        <h2 id="counter">0</h2>
        <button onclick="increment()">سبّح</button>
        <button onclick="reset()">صفر</button>
    </div>

    <!-- الإذاعة -->
    <div class="card">
        <h3>إذاعة القرآن الكريم</h3>
        <audio controls style="width: 100%;">
            <source src="https://n03.radiojar.com/8s5u5tpdtf0vv" type="audio/mpeg">
        </audio>
    </div>

    <!-- الأذكار -->
    <div class="card">
        <h3>ذكر اليوم</h3>
        <p id="dhikr">سبحان الله وبحمده</p>
        <button onclick="changeDhikr()">ذكر آخر</button>
    </div>

    <!-- القبلة -->
    <div class="card">
        <h3>بوصلة القبلة</h3>
        <div id="compass-arrow">↓</div>
        <p>قم بتدوير الهاتف</p>
    </div>

    <script>
        // عداد التسبيح
        let count = 0;
        function increment() { count++; document.getElementById("counter").innerText = count; }
        function reset() { count = 0; document.getElementById("counter").innerText = count; }

        // الأذكار
        const dhikrs = ["سبحان الله وبحمده", "استغفر الله العظيم", "لا إله إلا الله", "اللهم صل على محمد"];
        function changeDhikr() {
            document.getElementById("dhikr").innerText = dhikrs[Math.floor(Math.random() * dhikrs.length)];
        }

        // كود القبلة البسيط
        window.addEventListener("deviceorientation", (event) => {
            const compass = event.webkitCompassHeading || event.alpha;
            document.getElementById("compass-arrow").style.transform = `rotate(${compass}deg)`;
        });
    </script>
</body>
</html>
